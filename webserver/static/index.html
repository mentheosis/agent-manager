<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Squad</title>
<style>
  :root {
    --bg: #1a1b26;
    --bg-surface: #24283b;
    --bg-highlight: #2f3549;
    --border: #3b4261;
    --text: #c0caf5;
    --text-dim: #565f89;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --red: #f7768e;
    --yellow: #e0af68;
    --orange: #ff9e64;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sidebar-header h1 { font-size: 14px; color: var(--accent); }
  #btn-new {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
  }
  #btn-new:hover { opacity: 0.85; }
  #instance-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .instance-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    border: 1px solid transparent;
  }
  .instance-item:hover { background: var(--bg-highlight); }
  .instance-item.active {
    background: var(--bg-highlight);
    border-left: 3px solid var(--accent);
  }
  /* Waiting but NOT selected: subtle right-side yellow gradient */
  .instance-item.waiting {
    border-color: transparent;
    border-right: 2px solid var(--yellow);
    background: linear-gradient(to right, transparent 0%, rgba(224, 175, 104, 0.1) 100%);
    animation: pulse-waiting 2s ease-in-out infinite;
  }
  /* Waiting AND selected: full yellow highlight with accent left border */
  .instance-item.active.waiting {
    border-left: 3px solid var(--accent);
    border-color: var(--yellow);
    border-left-color: var(--accent);
    background: rgba(224, 175, 104, 0.12);
    box-shadow: 0 0 8px rgba(224, 175, 104, 0.2);
  }
  @keyframes pulse-waiting {
    0%, 100% { box-shadow: 0 0 4px rgba(224, 175, 104, 0.05); }
    50% { box-shadow: 0 0 10px rgba(224, 175, 104, 0.2); }
  }
  .instance-title { font-size: 13px; font-weight: 600; }
  .instance-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .instance-path {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.running { background: var(--green); animation: pulse-dot 1.5s ease-in-out infinite; }
  .status-dot.ready { background: var(--yellow); }
  .status-dot.loading { background: var(--orange); animation: pulse-dot 1s ease-in-out infinite; }
  .status-dot.paused { background: var(--text-dim); }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-label { font-weight: 600; }
  .status-label.ready { color: var(--yellow); }
  .status-label.running { color: var(--green); }
  .status-label.loading { color: var(--orange); }
  .status-label.paused { color: var(--text-dim); }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
    height: 100vh;
  }
  #active-view {
    display: none;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #active-view.visible {
    display: flex;
  }

  /* Tab bar */
  #tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .tab {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.1s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Toolbar */
  #toolbar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .toolbar-btn {
    background: var(--bg-highlight);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .toolbar-btn:hover { border-color: var(--accent); }
  .toolbar-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .toolbar-separator { width: 1px; background: var(--border); margin: 0 4px; }
  .mode-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-right: auto;
    font-size: 11px;
    color: var(--text-dim);
  }
  .mode-btn {
    background: var(--bg-highlight);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.1s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* Terminal output */
  #output-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    font-size: 13px;
    line-height: 1.4;
    background: var(--bg);
    tab-size: 8;
    position: relative;
  }
  #output-area * {
    max-width: 100%;
  }
  .connection-error {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
    flex-direction: column;
    gap: 12px;
  }
  .connection-error .error-icon { font-size: 32px; opacity: 0.5; }
  .connection-error .error-msg { max-width: 400px; text-align: center; }
  .connection-error .retry-btn {
    background: var(--bg-highlight);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .connection-error .retry-btn:hover { border-color: var(--accent); }

  /* Rules editor */
  #rules-editor {
    display: none;
    flex: 1;
    min-height: 0;
    flex-direction: column;
  }
  #rules-editor.visible { display: flex; }
  #rules-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    font-size: 11px;
    color: var(--text-dim);
  }
  #rules-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #rules-save-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 4px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
  }
  #rules-save-btn:hover { opacity: 0.85; }
  #rules-save-btn:disabled { opacity: 0.4; cursor: default; }
  #rules-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    transition: opacity 0.3s;
  }
  #rules-status.saved { color: var(--green); }
  #rules-status.unsaved { color: var(--yellow); }
  #rules-textarea {
    flex: 1;
    min-height: 0;
    background: var(--bg);
    color: var(--text);
    border: none;
    padding: 16px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.5;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  #output-area.diff { color: var(--text); }
  .diff-add { color: var(--green); }
  .diff-del { color: var(--red); }
  .diff-hunk { color: var(--accent); }
  .ansi-bold { font-weight: 700; }
  .ansi-dim { opacity: 0.6; }
  .ansi-italic { font-style: italic; }
  .ansi-underline { text-decoration: underline; }
  .ansi-strikethrough { text-decoration: line-through; }
  .ansi-inverse { filter: invert(1); }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Input area */
  #input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex;
    gap: 8px;
  }
  #prompt-input {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  #prompt-input:focus { border-color: var(--accent); }
  #btn-send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
  }
  #btn-send:hover { opacity: 0.85; }
  .history-btn {
    background: var(--bg-highlight);
    color: var(--text-dim);
    border: 1px solid var(--border);
    width: 32px;
    height: 36px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.1s;
  }
  .history-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  .history-btn:disabled { opacity: 0.3; cursor: default; }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #modal-overlay.visible { display: flex; }
  #modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: 400px;
  }
  #modal h2 { font-size: 14px; margin-bottom: 16px; }
  #modal input, #modal textarea {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
  }
  #modal textarea { height: 80px; resize: vertical; }
  #modal input:focus, #modal textarea:focus { border-color: var(--accent); }
  #modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  #modal-actions button {
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    border: 1px solid var(--border);
  }
  #modal-cancel { background: var(--bg-highlight); color: var(--text); }
  #modal-submit { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* Sidebar footer */
  #sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  #btn-sessions {
    width: 100%;
    background: var(--bg-highlight);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    text-align: left;
    transition: all 0.15s;
  }
  #btn-sessions:hover { color: var(--text); border-color: var(--accent); }
  #btn-sessions.active { color: var(--accent); border-color: var(--accent); background: var(--bg); }

  /* Sessions view */
  #sessions-view {
    display: none;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #sessions-view.visible { display: flex; }
  #sessions-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sessions-header h2 { font-size: 15px; color: var(--text); font-weight: 600; }
  #sessions-count { font-size: 12px; color: var(--text-dim); }
  #sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }
  .session-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.15s;
  }
  .session-card:hover { border-color: var(--accent); }
  .session-card.active-session { border-left: 3px solid var(--green); }
  .session-info { flex: 1; min-width: 0; }
  .session-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .session-active-badge {
    font-size: 10px;
    background: var(--green);
    color: var(--bg);
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
  }
  .session-details {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    margin-top: 4px;
  }
  .session-detail-label { color: var(--text-dim); opacity: 0.7; }
  .session-path-row {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .session-delete-btn {
    background: var(--bg-highlight);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.15s;
  }
  .session-delete-btn:hover { border-color: var(--red); color: var(--red); }
  .sessions-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 48px 16px;
    font-size: 13px;
  }
  .sessions-group-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 12px 0 8px 0;
    margin-top: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sessions-group-header:first-child { margin-top: 0; }
  .sessions-group-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
  }
  .sessions-group-badge.squad { background: var(--accent); color: var(--bg); }
  .sessions-group-badge.cli { background: var(--text-dim); color: var(--bg); }
  .session-card.cli-session { border-left: 3px solid var(--text-dim); }
  .session-id {
    font-size: 10px;
    color: var(--text-dim);
    font-family: inherit;
    opacity: 0.7;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Claude Squad</h1>
    <button id="btn-new">+ New</button>
  </div>
  <div id="instance-list"></div>
  <div id="sidebar-footer">
    <button id="btn-sessions">All Saved Sessions</button>
  </div>
</div>

<div id="main">
  <div id="empty-state">Select or create an instance to get started</div>
  <div id="sessions-view">
    <div id="sessions-header">
      <h2>Saved Sessions</h2>
      <span id="sessions-count"></span>
    </div>
    <div id="sessions-list"></div>
  </div>
  <div id="active-view">
    <div id="tabs">
      <div class="tab active" data-tab="terminal">Terminal</div>
      <div class="tab" data-tab="diff">Diff</div>
      <div class="tab" data-tab="rules">Rules</div>
    </div>
    <div id="toolbar">
      <div class="mode-selector">
        <span>Mode:</span>
        <button class="mode-btn" id="mode-agent">Agent</button>
        <button class="mode-btn" id="mode-plan">Plan</button>
      </div>
      <button class="toolbar-btn" id="btn-pause">Pause</button>
      <button class="toolbar-btn" id="btn-resume">Resume</button>
      <button class="toolbar-btn danger" id="btn-kill">Kill</button>
    </div>
    <div id="output-area"></div>
    <div id="rules-editor">
      <div id="rules-toolbar">
        <span id="rules-path"></span>
        <span id="rules-status"></span>
        <button id="rules-save-btn">Save</button>
      </div>
      <textarea id="rules-textarea" placeholder="# CLAUDE.md&#10;&#10;Add rules and instructions for Claude Code here..."></textarea>
    </div>
    <div id="input-area">
      <input id="prompt-input" type="text" placeholder="Send a message...">
      <button id="btn-send">Send</button>
      <button class="history-btn" id="btn-hist-prev" title="Previous prompt" disabled>&#x25B2;</button>
      <button class="history-btn" id="btn-hist-next" title="Next prompt" disabled>&#x25BC;</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>New Instance</h2>
    <input id="modal-title" type="text" placeholder="Instance name">
    <label style="display:block;margin-bottom:4px;font-size:11px;color:var(--text-dim)">Working directory</label>
    <input id="modal-path" type="text" placeholder="Absolute path (default: current dir)">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:var(--text-dim)">
      <input id="modal-gitmode" type="checkbox"> Use git worktree isolation
    </label>
    <div id="git-options" style="display:none;margin-bottom:12px;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg)">
      <label style="display:block;margin-bottom:4px;font-size:11px;color:var(--text-dim)">Git repo path (the repo to branch from)</label>
      <input id="modal-repo" type="text" placeholder="Same as working directory if empty" style="margin-bottom:8px">
      <label style="display:block;margin-bottom:4px;font-size:11px;color:var(--text-dim)">Branch name (optional, auto-generated if empty)</label>
      <input id="modal-branch" type="text" placeholder="e.g. feature/my-task">
      <p style="font-size:10px;color:var(--text-dim);margin-top:6px">Agent will work in an isolated worktree branched from this repo. The working directory above is used as the repo if no separate repo path is given.</p>
    </div>
    <textarea id="modal-prompt" placeholder="Initial prompt (optional)"></textarea>
    <div id="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-submit">Create</button>
    </div>
  </div>
</div>

<script type="module">
import { ConvLogView } from '/static/js/convlog.js';
import { InputHistory } from '/static/js/input-history.js';
import { api, apiFetch } from '/static/js/api.js';
import { esc, safeAnsiToHtml } from '/static/js/ansi.js';

let selectedTitle = null;
let activeTab = 'terminal';
let currentMode = 'agent';
let instanceStatuses = {};

// --- ConvLogView + InputHistory ---
const outputArea = document.getElementById('output-area');
const convLog = new ConvLogView(outputArea);

convLog.onStatus = (title, status) => {
  const prev = instanceStatuses[title];
  instanceStatuses[title] = status;
  if (prev !== status) refreshList();
};

convLog.onContent = (content) => {
  detectMode(content);
};

const inputHistory = new InputHistory(
  document.getElementById('prompt-input'),
  async (text) => {
    if (!selectedTitle) return;
    try {
      await api(`/${encodeURIComponent(selectedTitle)}/send`, {
        method: 'POST',
        body: JSON.stringify({ text }),
      });
    } catch (e) {
      alert('Failed to send: ' + e.message);
    }
  }
);

// --- Instance list ---
async function refreshList() {
  try {
    const instances = await api('');
    renderList(instances);
  } catch (e) {
    console.error('Failed to refresh:', e);
  }
}

function renderList(instances) {
  const el = document.getElementById('instance-list');
  el.innerHTML = '';
  instances.forEach(inst => {
    const status = instanceStatuses[inst.title] || inst.status;
    const isWaiting = status === 'ready';
    const statusLabel = isWaiting ? 'waiting' : status;

    const div = document.createElement('div');
    let cls = 'instance-item';
    if (inst.title === selectedTitle) cls += ' active';
    if (isWaiting) cls += ' waiting';
    div.className = cls;
    div.onclick = () => selectInstance(inst.title);

    const diffInfo = (inst.diff_added || inst.diff_removed)
      ? `+${inst.diff_added} -${inst.diff_removed}`
      : '';
    const shortPath = inst.work_dir ? inst.work_dir.replace(/^\/Users\/[^/]+/, '~') : '';
    const gitBadge = inst.git_mode ? '<span style="color:var(--orange)">git</span>' : '';
    div.innerHTML = `
      <div class="instance-title">${esc(inst.title)}</div>
      <div class="instance-meta">
        <span class="status-dot ${status}"></span>
        <span class="status-label ${status}">${statusLabel}</span>
        ${gitBadge}
        ${diffInfo ? `<span>${diffInfo}</span>` : ''}
      </div>
      <div class="instance-path" title="${esc(inst.work_dir || '')}">${esc(shortPath)}</div>
    `;
    el.appendChild(div);
  });
}

function selectInstance(title) {
  selectedTitle = title;
  hideSessions();
  diffGeneration++;
  rulesGeneration++;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('active-view').classList.add('visible');
  refreshList();

  // Load input history for this instance
  loadInputHistory(title);

  if (activeTab === 'diff') {
    loadDiff();
  } else {
    activeTab = 'terminal';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'terminal'));
    convLog.connect(title);
  }
  setTimeout(() => document.getElementById('prompt-input').focus(), 50);
}

async function loadInputHistory(title) {
  try {
    const data = await api(`/${encodeURIComponent(title)}/input-history`);
    if (data && data.history) {
      inputHistory.loadHistory(data.history);
    }
  } catch (e) {
    // Ignore - input history is a nice-to-have
  }
}

// --- Tabs ---
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

  const output = document.getElementById('output-area');
  const rulesEditor = document.getElementById('rules-editor');
  const inputArea = document.getElementById('input-area');

  if (tab === 'terminal') {
    output.style.display = '';
    output.className = '';
    rulesEditor.classList.remove('visible');
    inputArea.style.display = 'flex';
    convLog.connect(selectedTitle);
    setTimeout(() => document.getElementById('prompt-input').focus(), 50);
  } else if (tab === 'diff') {
    output.style.display = '';
    output.className = 'diff';
    rulesEditor.classList.remove('visible');
    inputArea.style.display = 'flex';
    convLog.disconnect();
    loadDiff();
  } else if (tab === 'rules') {
    output.style.display = 'none';
    rulesEditor.classList.add('visible');
    inputArea.style.display = 'none';
    convLog.disconnect();
    loadRules();
  }
}

// --- Tab click handlers ---
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

// --- Rules ---
let rulesSavedContent = '';
let rulesUnsaved = false;
let rulesGeneration = 0;

async function loadRules() {
  if (!selectedTitle) return;
  rulesGeneration++;
  const gen = rulesGeneration;
  const titleAtRequest = selectedTitle;

  const statusEl = document.getElementById('rules-status');
  const pathEl = document.getElementById('rules-path');
  const textarea = document.getElementById('rules-textarea');
  const saveBtn = document.getElementById('rules-save-btn');

  statusEl.textContent = 'Loading...';
  statusEl.className = '';

  try {
    const data = await api(`/${encodeURIComponent(titleAtRequest)}/rules`);
    if (gen !== rulesGeneration) return;
    rulesSavedContent = data.content || '';
    textarea.value = rulesSavedContent;
    pathEl.textContent = data.path || 'CLAUDE.md';
    rulesUnsaved = false;
    saveBtn.disabled = true;
    if (data.exists) {
      statusEl.textContent = '';
    } else {
      statusEl.textContent = 'New file';
      statusEl.className = 'unsaved';
    }
  } catch (e) {
    if (gen !== rulesGeneration) return;
    statusEl.textContent = 'Error loading';
    statusEl.className = 'unsaved';
    textarea.value = '';
    pathEl.textContent = 'CLAUDE.md';
  }
  textarea.focus();
}

function onRulesEdit() {
  const textarea = document.getElementById('rules-textarea');
  const statusEl = document.getElementById('rules-status');
  const saveBtn = document.getElementById('rules-save-btn');
  const changed = textarea.value !== rulesSavedContent;
  rulesUnsaved = changed;
  saveBtn.disabled = !changed;
  if (changed) {
    statusEl.textContent = 'Unsaved changes';
    statusEl.className = 'unsaved';
  } else {
    statusEl.textContent = '';
    statusEl.className = '';
  }
}

async function saveRules() {
  if (!selectedTitle || !rulesUnsaved) return;
  const textarea = document.getElementById('rules-textarea');
  const statusEl = document.getElementById('rules-status');
  const saveBtn = document.getElementById('rules-save-btn');

  saveBtn.disabled = true;
  statusEl.textContent = 'Saving...';
  statusEl.className = '';

  try {
    await api(`/${encodeURIComponent(selectedTitle)}/rules`, {
      method: 'PUT',
      body: JSON.stringify({ content: textarea.value }),
    });
    rulesSavedContent = textarea.value;
    rulesUnsaved = false;
    statusEl.textContent = 'Saved';
    statusEl.className = 'saved';
    setTimeout(() => {
      if (!rulesUnsaved) {
        statusEl.textContent = '';
        statusEl.className = '';
      }
    }, 2000);
  } catch (e) {
    statusEl.textContent = 'Save failed';
    statusEl.className = 'unsaved';
    saveBtn.disabled = false;
  }
}

document.getElementById('rules-textarea').addEventListener('input', onRulesEdit);
document.getElementById('rules-save-btn').addEventListener('click', saveRules);

// --- Load diff ---
let diffGeneration = 0;

async function loadDiff() {
  if (!selectedTitle) return;
  diffGeneration++;
  const gen = diffGeneration;
  const titleAtRequest = selectedTitle;
  try {
    const data = await api(`/${encodeURIComponent(titleAtRequest)}/diff`);
    if (gen !== diffGeneration) return;
    const output = document.getElementById('output-area');
    output.innerHTML = formatDiff(data.content || 'No changes');
  } catch (e) {
    if (gen !== diffGeneration) return;
    document.getElementById('output-area').textContent = 'Error: ' + e.message;
  }
}

function formatDiff(text) {
  if (!text) return '';
  return text.split('\n').map(line => {
    if (line.startsWith('+') && !line.startsWith('+++'))
      return `<span class="diff-add">${esc(line)}</span>`;
    if (line.startsWith('-') && !line.startsWith('---'))
      return `<span class="diff-del">${esc(line)}</span>`;
    if (line.startsWith('@@'))
      return `<span class="diff-hunk">${esc(line)}</span>`;
    return esc(line);
  }).join('\n');
}

// --- Actions ---
async function actionPause() {
  if (!selectedTitle) return;
  if (!confirm(`Pause "${selectedTitle}"?`)) return;
  try {
    await api(`/${encodeURIComponent(selectedTitle)}/pause`, { method: 'POST' });
    convLog.disconnect();
    refreshList();
  } catch (e) { alert('Error: ' + e.message); }
}

async function actionResume() {
  if (!selectedTitle) return;
  try {
    await api(`/${encodeURIComponent(selectedTitle)}/resume`, { method: 'POST' });
    refreshList();
    convLog.connect(selectedTitle);
  } catch (e) { alert('Error: ' + e.message); }
}

async function actionKill() {
  if (!selectedTitle) return;
  if (!confirm(`Kill "${selectedTitle}"? This cannot be undone.`)) return;
  try {
    await api(`/${encodeURIComponent(selectedTitle)}/kill`, { method: 'POST' });
    convLog.disconnect();
    selectedTitle = null;
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('active-view').classList.remove('visible');
    refreshList();
  } catch (e) { alert('Error: ' + e.message); }
}

// Toolbar button handlers
document.getElementById('btn-pause').addEventListener('click', actionPause);
document.getElementById('btn-resume').addEventListener('click', actionResume);
document.getElementById('btn-kill').addEventListener('click', actionKill);
document.getElementById('btn-send').addEventListener('click', () => inputHistory.send());
document.getElementById('btn-hist-prev').addEventListener('click', () => inputHistory.prev());
document.getElementById('btn-hist-next').addEventListener('click', () => inputHistory.next());

inputHistory.onNavigate = () => {
  document.getElementById('btn-hist-prev').disabled = !inputHistory.hasPrev;
  document.getElementById('btn-hist-next').disabled = !inputHistory.hasNext;
};

// --- Modal ---
function showNewModal() {
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('modal-title').value = '';
  document.getElementById('modal-path').value = '';
  document.getElementById('modal-gitmode').checked = false;
  document.getElementById('modal-repo').value = '';
  document.getElementById('modal-branch').value = '';
  document.getElementById('modal-prompt').value = '';
  document.getElementById('git-options').style.display = 'none';
  setTimeout(() => document.getElementById('modal-title').focus(), 100);
}

function toggleGitOptions() {
  document.getElementById('git-options').style.display =
    document.getElementById('modal-gitmode').checked ? 'block' : 'none';
}

function hideModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

async function createInstance() {
  const title = document.getElementById('modal-title').value.trim();
  const path = document.getElementById('modal-path').value.trim();
  const git_mode = document.getElementById('modal-gitmode').checked;
  const repo_path = document.getElementById('modal-repo').value.trim();
  const branch = document.getElementById('modal-branch').value.trim();
  const prompt = document.getElementById('modal-prompt').value.trim();
  if (!title) { alert('Title is required'); return; }
  hideModal();
  try {
    await api('', {
      method: 'POST',
      body: JSON.stringify({ title, prompt, path: path || '', git_mode, repo_path, branch }),
    });
    selectInstance(title);
    refreshList();
  } catch (e) { alert('Error: ' + e.message); }
}

document.getElementById('btn-new').addEventListener('click', showNewModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) hideModal();
});
document.getElementById('modal-cancel').addEventListener('click', hideModal);
document.getElementById('modal-submit').addEventListener('click', createInstance);
document.getElementById('modal-title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('modal-path').focus();
});
document.getElementById('modal-gitmode').addEventListener('change', toggleGitOptions);

// --- Mode ---
function detectMode(content) {
  const plain = content.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
  if (/plan\s*mode/i.test(plain) || /\bplan\b.*\bmode\b/i.test(plain)) {
    updateModeUI('plan');
  } else {
    updateModeUI('agent');
  }
}

function updateModeUI(mode) {
  currentMode = mode;
  document.getElementById('mode-agent').classList.toggle('active', mode === 'agent');
  document.getElementById('mode-plan').classList.toggle('active', mode === 'plan');
}

async function setMode(mode) {
  if (!selectedTitle) return;
  const cmd = mode === 'plan' ? '/plan' : '/agent';
  try {
    await api(`/${encodeURIComponent(selectedTitle)}/send`, {
      method: 'POST',
      body: JSON.stringify({ text: cmd }),
    });
    updateModeUI(mode);
  } catch (e) {
    alert('Failed to switch mode: ' + e.message);
  }
}

document.getElementById('mode-agent').addEventListener('click', () => setMode('agent'));
document.getElementById('mode-plan').addEventListener('click', () => setMode('plan'));

// --- Sessions screen ---
let sessionsVisible = false;

function showSessions() {
  sessionsVisible = true;
  selectedTitle = null;
  convLog.disconnect();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('active-view').classList.remove('visible');
  document.getElementById('sessions-view').classList.add('visible');
  document.getElementById('btn-sessions').classList.add('active');
  document.querySelectorAll('.instance-item').forEach(el => el.classList.remove('active'));
  loadSessions();
}

function hideSessions() {
  sessionsVisible = false;
  document.getElementById('sessions-view').classList.remove('visible');
  document.getElementById('btn-sessions').classList.remove('active');
}

async function loadSessions() {
  const list = document.getElementById('sessions-list');
  const count = document.getElementById('sessions-count');
  list.innerHTML = '';

  // Fetch both sources in parallel
  let squadSessions = [];
  let cliSessions = [];
  try {
    const [squadRes, cliRes] = await Promise.all([
      fetch('/api/sessions', { headers: { 'Content-Type': 'application/json' } }),
      fetch('/api/cli-sessions', { headers: { 'Content-Type': 'application/json' } }),
    ]);
    if (squadRes.ok) squadSessions = await squadRes.json();
    if (cliRes.ok) cliSessions = await cliRes.json();
  } catch (e) {
    list.innerHTML = `<div class="sessions-empty">Failed to load sessions: ${esc(e.message)}</div>`;
    return;
  }

  const totalCount = squadSessions.length + cliSessions.length;
  count.textContent = `${totalCount} session${totalCount !== 1 ? 's' : ''}`;

  if (totalCount === 0) {
    list.innerHTML = '<div class="sessions-empty">No sessions found</div>';
    return;
  }

  // Render Claude Squad sessions
  if (squadSessions.length > 0) {
    squadSessions.sort((a, b) => {
      if (a.active !== b.active) return b.active ? 1 : -1;
      return new Date(b.updated_at) - new Date(a.updated_at);
    });

    const header = document.createElement('div');
    header.className = 'sessions-group-header';
    header.innerHTML = `<span class="sessions-group-badge squad">SQUAD</span> Claude Squad Sessions <span style="margin-left:auto;font-weight:400;font-size:11px">${squadSessions.length}</span>`;
    list.appendChild(header);

    squadSessions.forEach(s => {
      list.appendChild(renderSquadSessionCard(s));
    });
  }

  // Render Claude Code CLI sessions
  if (cliSessions.length > 0) {
    const header = document.createElement('div');
    header.className = 'sessions-group-header';
    header.innerHTML = `<span class="sessions-group-badge cli">CLI</span> Claude Code CLI Sessions <span style="margin-left:auto;font-weight:400;font-size:11px">${cliSessions.length}</span>`;
    list.appendChild(header);

    cliSessions.forEach(s => {
      list.appendChild(renderCLISessionCard(s));
    });
  }
}

function renderSquadSessionCard(s) {
  const card = document.createElement('div');
  card.className = 'session-card' + (s.active ? ' active-session' : '');

  const statusLabel = s.status === 'ready' ? 'waiting' : s.status;
  const created = formatRelativeTime(s.created_at);
  const updated = formatRelativeTime(s.updated_at);
  const shortPath = (s.path || '').replace(/^\/Users\/[^/]+/, '~');
  const diffInfo = (s.diff_added || s.diff_removed) ? `+${s.diff_added} -${s.diff_removed}` : '';

  card.innerHTML = `
    <div class="session-info">
      <div class="session-title">
        ${esc(s.title)}
        ${s.active ? '<span class="session-active-badge">ACTIVE</span>' : ''}
        <span class="status-dot ${s.status}" style="margin-left:4px"></span>
        <span class="status-label ${s.status}" style="font-size:11px">${statusLabel}</span>
      </div>
      <div class="session-details">
        ${s.program ? `<span><span class="session-detail-label">program:</span> ${esc(s.program)}</span>` : ''}
        ${s.git_mode ? `<span style="color:var(--orange)">git mode</span>` : '<span>direct mode</span>'}
        ${s.branch_name ? `<span><span class="session-detail-label">branch:</span> ${esc(s.branch_name)}</span>` : ''}
        ${diffInfo ? `<span>${diffInfo}</span>` : ''}
        <span><span class="session-detail-label">created:</span> ${created}</span>
        <span><span class="session-detail-label">updated:</span> ${updated}</span>
      </div>
      <div class="session-path-row" title="${esc(s.path || '')}">${esc(shortPath)}</div>
    </div>
    <div class="session-actions">
      <button class="session-delete-btn">Delete</button>
    </div>
  `;
  card.querySelector('.session-delete-btn').addEventListener('click', (event) => {
    event.stopPropagation();
    deleteSession(s.title);
  });
  return card;
}

function renderCLISessionCard(s) {
  const card = document.createElement('div');
  card.className = 'session-card cli-session';

  const created = formatRelativeTime(s.created_at);
  const updated = formatRelativeTime(s.updated_at);
  const shortProject = (s.cwd || s.project || '').replace(/^\/Users\/[^/]+/, '~');
  const sizeKB = s.size_bytes ? Math.round(s.size_bytes / 1024) : 0;
  const shortId = s.session_id ? s.session_id.slice(0, 8) : '';

  card.innerHTML = `
    <div class="session-info">
      <div class="session-title">
        ${esc(shortProject || 'Unknown project')}
        <span class="session-id">${esc(shortId)}</span>
      </div>
      <div class="session-details">
        ${s.model ? `<span><span class="session-detail-label">model:</span> ${esc(s.model)}</span>` : ''}
        ${s.git_branch ? `<span><span class="session-detail-label">branch:</span> ${esc(s.git_branch)}</span>` : ''}
        ${s.version ? `<span><span class="session-detail-label">v:</span> ${esc(s.version)}</span>` : ''}
        ${sizeKB ? `<span>${sizeKB}KB</span>` : ''}
        <span><span class="session-detail-label">created:</span> ${created}</span>
        <span><span class="session-detail-label">updated:</span> ${updated}</span>
      </div>
      <div class="session-path-row" title="${esc(s.cwd || s.project || '')}">${esc(shortProject)}</div>
    </div>
  `;
  return card;
}

async function deleteSession(title) {
  if (!confirm(`Delete session "${title}"? This will remove it from storage and clean up resources. This cannot be undone.`)) return;
  try {
    const res = await fetch(`/api/sessions/${encodeURIComponent(title)}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    loadSessions();
    refreshList();
  } catch (e) {
    alert('Failed to delete: ' + e.message);
  }
}

document.getElementById('btn-sessions').addEventListener('click', showSessions);

function formatRelativeTime(isoString) {
  if (!isoString) return 'unknown';
  const date = new Date(isoString);
  const now = new Date();
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 30) return `${diffDay}d ago`;
  return date.toLocaleDateString();
}

// --- Keyboard shortcuts ---
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's' && activeTab === 'rules') {
    e.preventDefault();
    saveRules();
  }
});

// --- Status WebSocket: real-time status updates for all instances ---
let statusWsConnected = false;

function connectStatusWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const statusWs = new WebSocket(`${proto}//${location.host}/api/statuses/ws`);
  statusWs.onopen = () => {
    statusWsConnected = true;
  };
  statusWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'status_update' && msg.statuses) {
      let changed = false;
      for (const [title, status] of Object.entries(msg.statuses)) {
        if (instanceStatuses[title] !== status) {
          instanceStatuses[title] = status;
          changed = true;
        }
      }
      if (changed) refreshList();
    }
  };
  statusWs.onclose = () => {
    statusWsConnected = false;
    // Clear cached statuses so stale data doesn't override REST responses
    instanceStatuses = {};
    setTimeout(connectStatusWS, 3000);
  };
  statusWs.onerror = () => {
    statusWs.close();
  };
}
connectStatusWS();

// --- Poll (fallback, less frequent since status WS handles real-time) ---
setInterval(refreshList, 5000);
refreshList();
